<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin — Dpboss Content Manager</title>
  <link rel="stylesheet" href="/styles.css" />
  <style>
    /* small admin-specific tweaks */
    .admin-wrap{max-width:980px;margin:12px auto;padding:12px;background:#fff;border-radius:10px}
    .admin-grid{display:grid;grid-template-columns:1fr 320px;gap:12px}
    .panel{padding:12px;border-radius:8px;background:#fafafa;border:1px solid rgba(16,24,40,0.04)}
    .field{display:flex;flex-direction:column;margin-bottom:10px}
    .field label{font-weight:700;margin-bottom:6px;color:#333}
    .field input[type="text"], .field textarea, .field select{padding:8px;border-radius:8px;border:1px solid #ddd}
    .markets-list{max-height:360px;overflow:auto;padding:6px;display:flex;flex-direction:column;gap:8px}
    .market-item{display:flex;align-items:center;gap:8px;padding:8px;border-radius:8px;background:#fff;border:1px solid rgba(0,0,0,0.04)}
    .market-item .name{flex:1;font-weight:700}
    .btn{display:inline-flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;border:0;cursor:pointer}
    .btn.primary{background:var(--header-bg);color:#fff}
    .btn.ghost{background:transparent;border:1px solid #ddd}
    .small{font-size:13px;color:#666}
    .actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
    .topbar{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:12px}
    .switch{display:inline-flex;align-items:center;gap:8px}
    .switch input{transform:scale(1.1)}
    .textarea-small{height:96px}
    .json-area{height:160px;font-family:monospace;font-size:13px;padding:8px}
  </style>
</head>
<body>
  <!-- Login overlay + admin app wrapper -->
  <div id="loginOverlay" style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.45);z-index:9999">
    <div style="width:320px;padding:18px;border-radius:10px;background:#fff;box-shadow:0 8px 28px rgba(0,0,0,0.25);">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <strong>Admin Login</strong>
        <button id="loginClose" style="background:transparent;border:0;font-size:18px;cursor:pointer">✕</button>
      </div>
      <div style="display:flex;flex-direction:column;gap:8px">
        <input id="loginUser" type="text" placeholder="Username" style="padding:10px;border-radius:8px;border:1px solid #ddd" />
        <input id="loginPass" type="password" placeholder="Password" style="padding:10px;border-radius:8px;border:1px solid #ddd" />
        <div style="display:flex;gap:8px;align-items:center;justify-content:flex-end">
          <button id="loginBtn" class="btn primary">Login</button>
        </div>
        <div id="loginError" style="color:#b00020;font-size:13px;display:none">Invalid credentials</div>
      </div>
      <div style="margin-top:10px;font-size:12px;color:#666">Use provided admin credentials to access settings.</div>
    </div>
  </div>

  <div id="adminApp" style="display:none">
    <div class="topbar" style="max-width:980px;margin:12px auto;">
      <div><strong>Admin — Dpboss Content Manager</strong></div>
      <div class="actions">
        <button id="applyBtn" class="btn primary">Apply & Save</button>
        <button id="openHome" class="btn ghost">Open Home</button>
        <button id="logoutBtn" class="btn" style="background:#eee">Logout</button>
      </div>
    </div>
  </div>

  <div class="admin-wrap admin-grid">
    <div class="panel">
      <h3>Markets (Add / Edit / Remove)</h3>
      <div class="field">
        <label for="newMarket">Add Market</label>
        <div style="display:flex;gap:8px">
          <input id="newMarket" type="text" placeholder="e.g., New Market Day" />
          <button id="addMarket" class="btn primary">Add</button>
        </div>
      </div>

      <div class="markets-list" id="marketsList" aria-live="polite"></div>

      <hr style="margin:12px 0">

      <h4>Quick actions</h4>
      <div style="display:flex;gap:8px;margin-top:8px">
        <button id="exportBtn" class="btn">Export JSON</button>
        <button id="importBtn" class="btn">Import JSON</button>
        <button id="resetBtn" class="btn">Reset Defaults</button>
      </div>

      <div style="margin-top:8px;">
        <textarea id="jsonArea" class="json-area" placeholder='Paste markets JSON here for import'></textarea>
      </div>
    </div>

    <div class="panel">
      <h3>Site Settings</h3>

      <div class="field">
        <label>SEO Title</label>
        <input id="seoTitle" type="text" />
      </div>
      <div class="field">
        <label>SEO Description</label>
        <textarea id="seoDesc" class="textarea-small"></textarea>
      </div>
      <div class="field">
        <label>Canonical URL</label>
        <input id="canonical" type="text" />
      </div>

      <hr>

      <h4>Contact Buttons</h4>
      <div class="field">
        <label>WhatsApp Button</label>
        <div style="display:flex;gap:8px;align-items:center">
          <input id="waNumber" type="text" placeholder="e.g., +911234567890" />
          <label class="switch"><input id="waEnabled" type="checkbox" /> Enabled</label>
        </div>
      </div>

      <div class="field">
        <label>Call Button</label>
        <div style="display:flex;gap:8px;align-items:center">
          <input id="callNumber" type="text" placeholder="e.g., +911234567890" />
          <label class="switch"><input id="callEnabled" type="checkbox" /> Enabled</label>
        </div>
      </div>

      <hr>

      <h4>Other</h4>
      <div class="field">
        <label>Default Lucky Digits Seed (optional)</label>
        <input id="seedDigits" type="text" placeholder="e.g., 1234 or leave empty" />
        <div class="small">If set, lucky digits on home will initialise from this string.</div>
      </div>

      <div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap">
        <button id="saveSettings" class="btn primary">Save Settings</button>
        <button id="clearSettings" class="btn">Clear Settings</button>
      </div>
    </div>
  </div>

  <script src="/admin.js" type="module"></script>
</body>
</html>
